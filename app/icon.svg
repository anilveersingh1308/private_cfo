<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D2E6E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="32" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>
  <!-- Shield shape representing "Private / Secure" -->
  <path d="M16 2 L28 7 L28 17 C28 23.5 22.5 28.5 16 30 C9.5 28.5 4 23.5 4 17 L4 7 Z"
        fill="url(#shieldGrad)" stroke="#1E88E5" stroke-width="0.6"/>
  <!-- Inner shield highlight -->
  <path d="M16 5 L25.5 9 L25.5 17.2 C25.5 22.4 21.3 26.5 16 27.8 C10.7 26.5 6.5 22.4 6.5 17.2 L6.5 9 Z"
        fill="none" stroke="#3D86E8" stroke-width="0.4" opacity="0.5"/>
  <!-- Rising trend line (CFO / financial growth) -->
  <polyline points="9,20 13,15 17,17 22,10"
            stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Data point dots -->
  <circle cx="9"  cy="20" r="1.3" fill="#FFD54F"/>
  <circle cx="13" cy="15" r="1.3" fill="#FFD54F"/>
  <circle cx="17" cy="17" r="1.3" fill="#FFD54F"/>
  <circle cx="22" cy="10" r="1.3" fill="#FFA000"/>
</svg>
